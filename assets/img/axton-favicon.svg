    <radialGradient id="ax-grad" cx="30%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="40%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="160" fill="#020617"/>
  <circle cx="256" cy="256" r="190" fill="url(#ax-grad)"/>

  <!-- Glow ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#22d3ee" stroke-opacity="0.45" stroke-width="8"/>

  <!-- AX letters -->
  <text x="50%" y="52%" text-anchor="middle" dominant-baseline="middle"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="180" font-weight="700" fill="#e5f2ff">
